<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SENTINEL — glass box</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0b0f14; --panel:#111823; --panel2:#0e141d; --line:#1e2a3a;
    --txt:#dbe7f3; --dim:#7d8fa5; --cyan:#4dd7e6; --mag:#c792ea; --blue:#6ea8fe;
    --yel:#ffd166; --red:#ff5d5d; --grn:#3ddc84; --amber:#ffb84d;
  }
  *{box-sizing:border-box; margin:0}
  body{background:var(--bg); color:var(--txt);
       font:14px/1.45 "SF Mono", ui-monospace, Menlo, Consolas, monospace;
       height:100vh; display:flex; flex-direction:column; overflow:hidden}
  header{display:flex; align-items:center; gap:14px; padding:10px 16px;
         border-bottom:1px solid var(--line); background:var(--panel2)}
  .logo{font-size:20px; font-weight:700; letter-spacing:3px; color:var(--cyan)}
  .logo b{color:var(--txt)}
  .tag{color:var(--dim); font-size:12px}
  .chips{display:flex; gap:8px; margin-left:auto; flex-wrap:wrap}
  .chip{border:1px solid var(--line); border-radius:20px; padding:3px 10px;
        font-size:11px; color:var(--dim); background:var(--panel)}
  .chip b{color:var(--txt); font-weight:600}
  .chip.live b{color:var(--grn)}
  .stats{display:flex; gap:14px; padding:6px 16px; border-bottom:1px solid var(--line);
         font-size:12px; color:var(--dim); background:var(--panel2)}
  .stats b{color:var(--txt); font-size:15px}
  .stats .big b{color:var(--grn); font-size:16px}
  main{flex:1; display:grid; grid-template-columns: 27% 40% 33%; gap:10px;
       padding:10px; min-height:0}
  .col{display:flex; flex-direction:column; gap:10px; min-height:0}
  section{background:var(--panel); border:1px solid var(--line); border-radius:8px;
          display:flex; flex-direction:column; min-height:0; flex:1}
  section h2{font-size:11px; letter-spacing:2px; color:var(--dim); font-weight:600;
             padding:8px 12px; border-bottom:1px solid var(--line);
             display:flex; justify-content:space-between; align-items:center}
  h2 .src{color:var(--cyan); font-weight:400; letter-spacing:0; text-transform:none}
  .scroll{overflow-y:auto; padding:8px 10px; flex:1; min-height:0}
  /* feed */
  #feedwrap{flex:2.2}
  .fe{padding:2px 6px; color:var(--dim); font-size:12.5px; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis}
  .fe .t{color:#54657c; margin-right:6px}
  .fe.inc{color:var(--red); font-weight:700; background:rgba(255,93,93,.08);
          border-left:3px solid var(--red); animation:pulse 1.1s ease 3; font-size:13px;
          white-space:normal}
  .fe.adhoc{border-left-color:var(--yel)}
  @keyframes pulse{0%{background:rgba(255,93,93,.35)}100%{background:rgba(255,93,93,.08)}}
  /* queue */
  #queuewrap{flex:.8}
  .qchip{display:inline-block; margin:4px; padding:5px 10px; border-radius:6px;
         background:rgba(255,184,77,.12); border:1px solid var(--amber);
         color:var(--amber); font-size:12px}
  .qempty{color:var(--dim); padding:8px; font-size:12px}
  /* loop */
  #curinc{padding:8px 12px; border-bottom:1px solid var(--line); font-size:13px;
          color:var(--amber); min-height:34px}
  #curinc b{color:var(--txt)}
  .step{border:1px solid var(--line); border-left-width:5px; border-radius:6px;
        padding:8px 12px; margin:7px 0; background:var(--panel2)}
  .step .h{display:flex; gap:10px; align-items:baseline}
  .step .name{font-size:15px; font-weight:800; letter-spacing:1.5px}
  .step .it{color:var(--dim); font-size:11px}
  .step .msg{margin-top:3px; font-size:13px; color:var(--txt)}
  .step .extra{margin-top:3px; font-size:12px; color:var(--dim); white-space:pre-wrap}
  .PLAN{border-left-color:var(--cyan)} .PLAN .name{color:var(--cyan)}
  .ACT{border-left-color:var(--mag)} .ACT .name{color:var(--mag)}
  .OBSERVE{border-left-color:var(--blue)} .OBSERVE .name{color:var(--blue)}
  .VERIFY{border-left-color:var(--yel)} .VERIFY .name{color:var(--yel)}
  .CORRECT{border-left-color:var(--red); background:rgba(255,93,93,.10);
           animation:pulse 1s ease 2}
  .CORRECT .name{color:var(--red)}
  .SUCCESS{border-left-color:var(--grn); background:rgba(61,220,132,.08)}
  .SUCCESS .name{color:var(--grn)}
  .FAIL{border-left-color:var(--amber)} .FAIL .name{color:var(--amber)}
  .BLOCKED{border-left-color:var(--red); background:rgba(255,93,93,.14)}
  .BLOCKED .name{color:var(--red)}
  /* audit */
  .ae{border:1px solid var(--line); border-radius:6px; margin:7px 0; padding:9px 11px;
      background:var(--panel2); font-size:12.5px}
  .ae .head{display:flex; gap:8px; align-items:center; margin-bottom:4px}
  .badge{font-size:11px; font-weight:800; padding:2px 8px; border-radius:4px}
  .badge.ok{background:rgba(61,220,132,.15); color:var(--grn); border:1px solid var(--grn)}
  .badge.human{background:rgba(255,184,77,.15); color:var(--amber); border:1px solid var(--amber)}
  .badge.blocked{background:rgba(255,93,93,.15); color:var(--red); border:1px solid var(--red)}
  .ae .id{color:var(--dim); font-size:11px}
  .ae .elapsed{margin-left:auto; color:var(--cyan); font-weight:700}
  .ae .row{color:var(--dim); margin-top:2px}
  .ae .row b{color:var(--txt); font-weight:600}
  .ae .via{color:var(--cyan)}
  .ae .blk{color:var(--red); font-weight:700}
  footer{padding:6px 16px; border-top:1px solid var(--line); background:var(--panel2);
         display:flex; gap:8px; align-items:center; font-size:11px; color:var(--dim)}
  footer button{background:var(--panel); color:var(--dim); border:1px solid var(--line);
                border-radius:5px; padding:3px 9px; font:inherit; cursor:pointer}
  footer button:hover{color:var(--txt); border-color:var(--cyan)}
</style>
</head>
<body>
<header>
  <div class="logo">SENTI<b>NEL</b></div>
  <div class="tag">event-triggered · self-correcting · zero human intervention</div>
  <div class="chips" id="chips"></div>
</header>
<div class="stats">
  <span class="big">resolved <b id="s_res">0</b></span>
  <span>needs human <b id="s_hum">0</b></span>
  <span>policy blocks <b id="s_blk">0</b></span>
  <span>last detect→verified-fix <b id="s_time">—</b></span>
</div>
<main>
  <div class="col">
    <section id="feedwrap"><h2>LIVE FEED <span class="src" id="src_feed"></span></h2>
      <div class="scroll" id="feed"></div></section>
    <section id="queuewrap"><h2>INCIDENT QUEUE <span class="src">serial · one at a time</span></h2>
      <div class="scroll" id="queue"><div class="qempty">empty — watching…</div></div></section>
  </div>
  <div class="col">
    <section><h2>AGENT LOOP <span class="src" id="src_model"></span></h2>
      <div id="curinc">idle — no incident in flight</div>
      <div class="scroll" id="loop"></div></section>
  </div>
  <div class="col">
    <section><h2>AUDIT LOG <span class="src" id="src_policy"></span></h2>
      <div class="scroll" id="audit"></div></section>
  </div>
</main>
<footer>
  <span>Q&amp;A inject (off the demo path):</span>
  <button onclick="inject('error_rate_spike')">error spike</button>
  <button onclick="inject('queue_backlog')">queue backlog</button>
  <button onclick="inject('cert_expiring')">cert expiring</button>
  <button onclick="inject('interview_pipeline')">interview pipeline</button>
  <span id="runtime" style="margin-left:auto"></span>
</footer>
<script>
const $ = id => document.getElementById(id);
const cap = (el, n=60) => { while (el.children.length > n) el.removeChild(el.firstChild); };
const scroll = el => { el.scrollTop = el.scrollHeight; };
const hhmmss = ts => new Date(ts*1000).toTimeString().slice(0,8);

function inject(t){ fetch('/inject/'+t, {method:'POST'}); }

function chips(d){
  $('chips').innerHTML =
    chip('FEED', d.feed) + chip('TOOLS', d.tools) + chip('POLICY', d.policy) +
    chip('RUNTIME', d.runtime) + chip('MODEL', d.model);
  $('src_feed').textContent = 'via ' + d.feed;
  $('src_model').textContent = 'plan via ' + d.model;
  $('src_policy').textContent = 'gated by ' + d.policy;
  $('runtime').textContent = 'runtime: ' + d.runtime;
}
const chip = (k,v) => `<span class="chip ${/fallback|local|offline|cache/.test(v)?'':'live'}">${k} <b>${v}</b></span>`;

function feedRow(ev){
  const div = document.createElement('div');
  div.className = 'fe' + (ev.severity === 'incident' ? ' inc' : '') + (ev.adhoc ? ' adhoc' : '');
  div.innerHTML = `<span class="t">${hhmmss(ev.ts)}</span>` +
    (ev.severity === 'incident' ? `⚠ ${ev.id} ` : '') +
    `[${ev.service}] ${ev.summary}`;
  $('feed').appendChild(div); cap($('feed')); scroll($('feed'));
}

function queueView(q){
  $('queue').innerHTML = q.length
    ? q.map(x=>`<span class="qchip">${x.id} · ${x.type} · ${x.service}</span>`).join('')
    : '<div class="qempty">empty — watching…</div>';
}

function loopStep(d){
  const div = document.createElement('div');
  div.className = 'step ' + d.step;
  let extra = '';
  if (d.data && d.data.violations) extra = d.data.violations.map(v=>'✗ '+v).join('\n');
  if (d.data && d.data._show_action) extra = d.data._show_action;
  div.innerHTML = `<div class="h"><span class="name">${d.step}</span>` +
    `<span class="it">iter ${d.iteration} · ${d.event_id}</span></div>` +
    `<div class="msg">${d.message}</div>` +
    (extra ? `<div class="extra">${extra}</div>` : '');
  $('loop').appendChild(div); cap($('loop'), 40); scroll($('loop'));
}

function blockedFlash(d){
  const div = document.createElement('div');
  div.className = 'step BLOCKED';
  div.innerHTML = `<div class="h"><span class="name">⛔ ${d.policy_via.toUpperCase()}: BLOCKED</span></div>` +
    `<div class="msg">${d.tool}(${d.service}) — ${d.rule}</div>`;
  $('loop').appendChild(div); cap($('loop'), 40); scroll($('loop'));
}

function auditEntry(d){
  const div = document.createElement('div');
  div.className = 'ae';
  const badge = d.outcome === 'RESOLVED'
    ? '<span class="badge ok">✓ RESOLVED — NO HUMAN</span>'
    : '<span class="badge human">⚠ NEEDS HUMAN</span>';
  const acts = (d.actions||[]).map(a =>
    `<div class="row">→ <b>${a.tool}</b> <span class="via">via ${a.via}</span> — ` +
    (a.blocked ? `<span class="blk">BLOCKED by ${a.policy_via}</span>` : a.detail) + `</div>`).join('');
  div.innerHTML = `<div class="head">${badge}<span class="id">${d.event_id} · ${d.incident}` +
    ` · ${d.iterations} iter</span><span class="elapsed">${d.elapsed_s}s</span></div>` +
    `<div class="row">trigger: <b>${d.trigger}</b></div>` + acts +
    `<div class="row">verify: <b>${d.verification}</b></div>`;
  $('audit').appendChild(div); cap($('audit'), 30); scroll($('audit'));
  if (d.stats){
    $('s_res').textContent = d.stats.resolved;
    $('s_hum').textContent = d.stats.needs_human;
    $('s_blk').textContent = d.stats.blocked;
    if (d.stats.last_elapsed_s != null) $('s_time').textContent = d.stats.last_elapsed_s + 's';
  }
}

const es = new EventSource('/events');
es.onmessage = m => {
  const d = JSON.parse(m.data);
  if (d.channel === 'status') chips(d);
  else if (d.channel === 'feed') feedRow(d.event);
  else if (d.channel === 'queue') queueView(d.queued);
  else if (d.channel === 'incident_start')
    $('curinc').innerHTML = `▶ working <b>${d.event.id}</b> — ${d.event.summary}`;
  else if (d.channel === 'loop') loopStep(d);
  else if (d.channel === 'action' && d.blocked) blockedFlash(d);
  else if (d.channel === 'audit'){
    auditEntry(d);
    $('curinc').textContent = 'idle — no incident in flight';
  }
};
</script>
</body>
</html>
